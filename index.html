<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GUB Facial Animation Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      background: #111;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #topbar h1 { font-size: 14px; font-weight: 600; color: #ccc; margin-right: 6px; }

    .btn {
      padding: 4px 12px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a2a;
      color: #ddd;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }
    .btn:hover { background: #3a3a3a; }
    .btn.active { background: #2563eb; border-color: #3b82f6; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    #status {
      margin-left: auto;
      font-size: 11px;
      color: #888;
      min-width: 120px;
    }

    /* ── model select ── */
    #model-select {
      padding: 3px 6px;
      background: #2a2a2a;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── gesture bar ── */
    #gesturebar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #gesturebar span {
      font-size: 11px;
      color: #555;
      margin-right: 4px;
    }
    .gesture-btn {
      padding: 3px 10px;
      font-size: 11px;
      border-color: #444;
      color: #bbb;
    }
    .gesture-btn:disabled { opacity: 0.3; }
    .gesture-btn.playing  { background: #7c3aed; border-color: #8b5cf6; color: #fff; }

    /* ── main layout ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── sidebar ── */
    #sidebar {
      width: 260px;
      min-width: 200px;
      max-width: 340px;
      background: #222;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #reset-btn {
      font-size: 11px;
      padding: 2px 8px;
    }

    #params-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .param-row {
      padding: 4px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .param-row:hover { background: #2a2a2a; }

    .param-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .param-name {
      font-size: 12px;
      color: #ccc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
    }
    .param-val {
      font-size: 11px;
      color: #888;
      font-variant-numeric: tabular-nums;
      min-width: 40px;
      text-align: right;
    }
    .param-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #444;
      outline: none;
      cursor: pointer;
    }
    .param-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      border: none;
    }
    .param-slider::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      border: none;
    }

    /* ── viewport ── */
    #viewport {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
    }
    #canvas-wrap canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* Drop overlay */
    #drop-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(26,26,26,0.92);
      color: #888;
      gap: 12px;
      z-index: 10;
    }
    #drop-overlay.hidden { display: none; }
    #drop-overlay svg { opacity: 0.4; }
    #drop-overlay p { font-size: 15px; }
    #drop-overlay small { font-size: 12px; color: #555; }

    /* ── transport bar (DAT/WAV playback) ── */
    #transport {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-top: 1px solid #333;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
    }
    #transport.hidden { display: none; }

    /* Push body content up so transport doesn't overlap canvas */
    body.transport-visible #main { padding-bottom: 36px; }

    #timeline {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #444;
      outline: none;
      cursor: pointer;
    }
    #timeline::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #f59e0b;
      cursor: pointer;
    }
    #time-label {
      font-size: 11px;
      color: #666;
      font-variant-numeric: tabular-nums;
      min-width: 80px;
      text-align: right;
    }

    /* ── drag highlight ── */
    body.dragover { outline: 3px solid #3b82f6; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>GUB Player</h1>
  <select id="model-select">
    <option value="">— Load model —</option>
    <option value="models/sven.gub">Sven</option>
    <option value="models/kattis.gub">Kattis</option>
  </select>
  <button class="btn" id="open-gub-btn">Open .gub…</button>
  <button class="btn" id="open-dat-btn" disabled>Open .dat…</button>
  <button class="btn" id="open-wav-btn" disabled>Open .wav…</button>
  <span id="status">Select a model or drop a .gub file</span>
</div>

<!-- Gesture bar -->
<div id="gesturebar">
  <span>Gestures:</span>
  <button class="btn gesture-btn" data-jog="gestures/neutral.jog"    disabled>Neutral</button>
  <button class="btn gesture-btn" data-jog="gestures/blink.jog"      disabled>Blink</button>
  <button class="btn gesture-btn" data-jog="gestures/blinkdouble.jog" disabled>Blink ×2</button>
  <button class="btn gesture-btn" data-jog="gestures/smileup.jog"    disabled>Smile</button>
  <button class="btn gesture-btn" data-jog="gestures/frowndown.jog"  disabled>Frown</button>
  <button class="btn gesture-btn" data-jog="gestures/areyousure.jog" disabled>Hm?</button>
  <button class="btn gesture-btn" data-jog="gestures/nod_double.jog" disabled>Nod</button>
  <button class="btn gesture-btn" data-jog="gestures/lookup.jog"     disabled>Look up</button>
</div>

<!-- Main -->
<div id="main">

  <!-- Sidebar: parameter sliders -->
  <div id="sidebar">
    <div id="sidebar-header">
      Parameters
      <button class="btn" id="reset-btn">Reset all</button>
    </div>
    <div id="params-container">
      <div style="padding:24px 12px; color:#555; font-size:12px;">Load a .gub model to see parameters.</div>
    </div>
  </div>

  <!-- Viewport -->
  <div id="viewport">
    <div id="canvas-wrap">
      <canvas id="glcanvas"></canvas>

      <!-- Drop overlay -->
      <div id="drop-overlay">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 16V8m0 0-3 3m3-3 3 3M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <p>Drop a <strong>.gub</strong> file here</p>
        <small>or use the "Open .gub…" button above</small>
      </div>
    </div>

    </div>
  </div>

</div>

<!-- Transport bar – full width, always at bottom -->
<div id="transport" class="hidden">
  <button class="btn" id="play-btn">▶ Play</button>
  <input type="range" id="timeline" min="0" max="100" value="0" step="1">
  <span id="time-label">0 / 0 frames</span>
</div>

<!-- Hidden file inputs -->
<input type="file" id="file-gub" accept=".gub" style="display:none">
<input type="file" id="file-dat" accept=".dat" style="display:none">
<input type="file" id="file-wav" accept=".wav,audio/*" style="display:none">

<!-- Prevent default drag-and-drop file navigation before anything else -->
<script>
(function() {
  ['dragover','drop'].forEach(function(evt) {
    document.addEventListener(evt, function(e) { e.preventDefault(); }, false);
  });
})();
</script>

<!-- Three.js + OrbitControls as plain global scripts -->
<script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.134.0/examples/js/controls/OrbitControls.js"></script>

<!-- Application scripts -->
<script src="gub-parser.js"></script>
<script src="dat-parser.js"></script>
<script src="jog-parser.js"></script>
<script src="gub-renderer.js"></script>
<script src="ui.js"></script>

</body>
</html>
